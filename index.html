<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhiraj - Professional Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="script.js"></script>
</head>
<body>
    <!-- Background animations -->
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">Abhiraj.</div>
        <button class="nav-toggle" id="navToggle">
            <i data-lucide="menu"></i>
        </button>
        <ul class="nav-links" id="navLinks">
            <li><a href="#home" class="nav-link active">Home</a></li>
            <li><a href="#about" class="nav-link">About</a></li>
            <li><a href="#projects" class="nav-link">Projects</a></li>
            <li><a href="#education" class="nav-link">Education</a></li>
            <li><a href="#certifications" class="nav-link">Certifications</a></li>
            <li><a href="#contact" class="nav-link">Contact</a></li>
        </ul>
    </nav>

    <!-- Main Content Area (Dynamic) -->
    <main id="app">
        <!-- Content will be injected here by script.js -->
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; <span id="year"></span> Abhiraj. All rights reserved.</p>
        <div class="social-links">
            <a href="#"><i data-lucide="github"></i></a>
            <a href="#"><i data-lucide="linkedin"></i></a>
            <a href="mailto:contact@abhiraj.com"><i data-lucide="mail"></i></a>
        </div>
    </footer>

    <!-- Modal for viewing certificate/resume -->
    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImg">
    </div>

</body>
</html>
